name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create release artifact
        run: |
          mkdir -p release/profitplus-exporter
          cp -r .next/standalone/* release/profitplus-exporter/
          # Remove node_modules from standalone build - server will install dependencies
          rm -rf release/profitplus-exporter/node_modules
          cp -r public release/profitplus-exporter/ 2>/dev/null || true
          cp package.json release/profitplus-exporter/
          cp bun.lockb release/profitplus-exporter/ 2>/dev/null || true
          cp .env.example release/profitplus-exporter/ 2>/dev/null || true
          cd release
          zip -r profitplus-exporter.zip profitplus-exporter/ -x "*/node_modules/*" "*/.git/*" "*.node"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: release/profitplus-exporter.zip
          artifactContentType: application/zip
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
