version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: profitplus-erp-mock
    environment:
      SA_PASSWORD: "YourStr0ngP@ssw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_COLLATION: "Modern_Spanish_CI_AS"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - profitplus-network

  mssql-init:
    image: python:3.9-slim
    container_name: profitplus-init
    depends_on:
      - mssql
    volumes:
      - ./init.py:/init.py
      - ./mssql/init.sql:/scripts/init.sql
      - ./mssql/data.sql:/scripts/data.sql
    networks:
      - profitplus-network
    command: bash -c "pip install pymssql > /dev/null 2>&1 && python /init.py"

volumes:
  mssql-data:

networks:
  profitplus-network:
    driver: bridge
